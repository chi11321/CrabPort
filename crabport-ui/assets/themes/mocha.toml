# Catppuccin Mocha — the legacy palette, kept for continuity.
# Structure mirrors `crabport_core::config::ThemeConfig`; see modern-dark.toml
# for the group layout.

name = "mocha"

[base]
bg_base = "#1e1e2e"
bg_sidebar = "#181825"
bg_tab_bar = "#181825"

[border]
border = "#313244"

[surface]
surface_hover = "#24273a"
surface_active = "#313244"

[text]
text_primary = "#cdd6f4"
text_muted = "#585b70"

[button]
bg = "#313244"
bg_hover = "#45475a"
bg_selected = "#585b70"
bg_pressed = "#6c7086"
bg_disabled = "#1e1e2e"
border = "#45475a"
text_disabled = "#585b70"

[button_primary]
bg = "#3b82f6"
bg_hover = "#2563eb"
bg_selected = "#1d4ed8"
