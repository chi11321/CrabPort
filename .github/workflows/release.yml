name: release

# Release workflow.
#
# Triggers:
#   - `v*` tag push            → full build + publish to GitHub Release
#   - manual `workflow_dispatch` → full build + publish for an existing tag
#
# How to cut a release:
#   git checkout main && git pull
#   git tag v0.2.0
#   git push origin v0.2.0
# Pushing the tag triggers this workflow; the resulting GitHub Release is
# attached to that tag.
#
# Packaging strategy:
#   - macOS  → `cargo bundle --format dmg`       → `.dmg` disk image
#   - Linux   → `cargo bundle --format appimage` → `.AppImage`
#   - Windows → `cargo build` + `Compress-Archive` → `.zip`
#     (cargo-bundle's MSI support has a bug in v0.11.0 where it inserts a
#     string value into a binary column, so we ship a zipped .exe instead.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (must already exist)"
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TOOLCHAIN: 1.91.1

jobs:
  # Create the GitHub Release (with auto-generated changelog) once,
  # before any build job runs. Build jobs then only upload their
  # artifacts to this release — they must NOT regenerate the notes,
  # otherwise each concurrent upload overwrites the body.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true

  build:
    needs: create-release
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: x86_64
            target: x86_64-apple-darwin
            runner: macos-14
            bundle_format: dmg
            artifact_ext: dmg
          - os: macos
            arch: aarch64
            target: aarch64-apple-darwin
            runner: macos-14
            bundle_format: dmg
            artifact_ext: dmg
          - os: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            bundle_format: appimage
            artifact_ext: AppImage
          - os: linux
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            bundle_format: appimage
            artifact_ext: AppImage
          - os: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
            runner: windows-2022
            artifact_ext: zip
          - os: windows
            arch: aarch64
            target: aarch64-pc-windows-msvc
            runner: windows-2022
            artifact_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        if: runner.os != 'Windows'
        run: cargo install cargo-bundle --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-cursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev \
            libfontconfig1-dev libfreetype6-dev \
            libasound2-dev libpulse-dev libdbus-1-dev \
            libssl-dev pkg-config \
            squashfs-tools

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      # ---- Build --------------------------------------------------------

      - name: Build bundle (non-Windows)
        if: runner.os != 'Windows'
        run: cargo bundle --release --target ${{ matrix.target }} --format ${{ matrix.bundle_format }}

      # cargo-bundle 0.11.0's `generate_dir_icon` only handles SVG icons —
      # when the icon list is PNG/ICNS only (our case: `app-icon.icns` +
      # `app-icon.png`), it silently skips and the AppDir root ends up with
      # no `.DirIcon`, no `.png`, no `.svg`. Tools like `app-manager install`
      # then reject the AppImage with:
      #   "No icon file (.DirIcon, .png, or .svg) found in AppImage root"
      #
      # Fix: after `cargo bundle` leaves the AppDir behind (it isn't cleaned
      # up — the `package_dir.exists()` removal runs at the *start* of the
      # next invocation, not after this one), inject `app-icon.png` as
      # `.DirIcon` and `CrabPort.png` at the AppDir root, then rebuild the
      # squashfs + runtime into a fresh .AppImage.
      #
      # We re-download the type2 runtime (same URL cargo-bundle uses) because
      # cargo-bundle doesn't expose the one it downloaded. `mksquashfs` is
      # already installed via `squashfs-tools` in the apt step above.
      - name: Inject .DirIcon into AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          arch="${{ matrix.arch }}"
          bundle_root="target/${{ matrix.target }}/release/bundle/appimage"
          appdir="$(find "$bundle_root" -maxdepth 2 -type d -name 'AppDir' | head -n1)"
          if [ -z "$appdir" ]; then
            echo "AppDir not found under $bundle_root — skipping .DirIcon injection"
            exit 1
          fi
          echo "Injecting icon into $appdir"
          cp app-icon.png "$appdir/.DirIcon"
          cp app-icon.png "$appdir/CrabPort.png"

          # Rebuild squashfs from the patched AppDir.
          new_squashfs="$RUNNER_TEMP/CrabPort.squashfs"
          rm -f "$new_squashfs"
          mksquashfs "$appdir" "$new_squashfs" -root-owned -noappend -quiet

          # Download the AppImage type2 runtime for this arch.
          runtime_url="https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-${arch}"
          runtime="$RUNNER_TEMP/runtime-${arch}"
          curl -fsSL -o "$runtime" "$runtime_url"
          chmod +x "$runtime"

          # Concatenate runtime + squashfs → new .AppImage, overwriting the
          # one cargo-bundle produced.
          old_appimage="$(find "$bundle_root" -maxdepth 2 -type f -name '*.AppImage' | head -n1)"
          cat "$runtime" "$new_squashfs" > "$old_appimage"
          chmod +x "$old_appimage"
          echo "Rebuilt $old_appimage with .DirIcon"

      - name: Build and package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --target ${{ matrix.target }}
          $exePath = "target\${{ matrix.target }}\release\CrabPort.exe"
          $tag = "${{ steps.tag.outputs.name }}"
          $name = "CrabPort-$tag-windows-${{ matrix.arch }}.zip"
          Compress-Archive -Path $exePath -DestinationPath "$env:RUNNER_TEMP\$name"
          "artifact=$env:RUNNER_TEMP\$name" >> $env:GITHUB_ENV

      # ---- Stage artifacts to a predictable path ------------------------

      - name: Stage artifact (non-Windows)
        if: runner.os != 'Windows'
        run: |
          set -e
          bundle_dir="target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_format }}"
          tag="${{ steps.tag.outputs.name }}"
          name="CrabPort-${tag}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.artifact_ext }}"
          artifact_path="$(find "$bundle_dir" -maxdepth 2 -type f -name '*.${{ matrix.artifact_ext }}' | head -n1)"
          cp "$artifact_path" "$RUNNER_TEMP/$name"
          echo "artifact=$RUNNER_TEMP/$name" >> $GITHUB_ENV

      # ---- Publish to the GitHub Release for this tag ------------------

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: ${{ env.artifact }}
          # Do NOT set generate_release_notes here — the release body was
          # already generated once by the create-release job. Setting it
          # again would overwrite the changelog on every upload.
          fail_on_unmatched_files: true
