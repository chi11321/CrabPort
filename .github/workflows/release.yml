name: release

# Release workflow.
#
# Triggers:
#   - `v*` tag push            → builds all platforms + publishes to GitHub Release
#   - manual `workflow_dispatch` → builds all platforms + uploads as workflow artifacts
#     (no release created — useful for testing the build matrix)
#
# How to cut a release:
#   git checkout main && git pull
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Packaging strategy (manual packaging, no `cargo bundle`):
#   - macOS  → `.app` bundle (codesigned) zipped via `ditto`
#   - Linux   → `.tar.gz` (+ best-effort AppImage via linuxdeploy)
#   - Windows → `.zip` (+ best-effort MSI via cargo-wix)
#
# No app icon yet — bundles ship without one. When an icon exists, add it
# to the macOS Info.plist / .icns, the Linux .desktop, and the Windows
# .rc/.wx step.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bin: CrabPort.exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            bin: CrabPort
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            bin: CrabPort
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
            bin: CrabPort
          - os: macos-14
            target: x86_64-apple-darwin
            name: macos-x86_64
            bin: CrabPort

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y universe || true
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-keysyms1-dev libxcb-icccm4-dev libxcb-image0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxcb-cursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev \
            libfontconfig1-dev libfreetype6-dev \
            libasound2-dev libpulse-dev libdbus-1-dev \
            libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      # ---- AppImage (Linux x86_64 only, best-effort) -------------------
      - name: Build AppImage
        if: matrix.name == 'linux-x86_64'
        continue-on-error: true
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          wget -q -O linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-appimage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-appimage

          install -Dm755 target/${{ matrix.target }}/release/${{ matrix.bin }} AppDir/usr/bin/${{ matrix.bin }}

          # Minimal .desktop file so AppImage has a launcher entry.
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/crabport.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=CrabPort
          Exec=CrabPort
          Categories=Network;TerminalEmulator;
          EOF

          ./linuxdeploy --appdir AppDir --output appimage

          mv CrabPort*.AppImage "CrabPort-${VERSION}-linux-x86_64.AppImage"
          echo "APPIMAGE=CrabPort-${VERSION}-linux-x86_64.AppImage" >> "$GITHUB_ENV"

      # ---- Package primary archive --------------------------------------
      - name: Package
        shell: bash
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="CrabPort-${VERSION}-${{ matrix.name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            # ── Build a proper .app bundle ──────────────────────────────
            # Without a bundle macOS opens raw binaries in Terminal.app and
            # never shows a Dock icon. Assemble by hand to avoid depending
            # on `cargo bundle`'s dmg step (which can be finicky).
            APP="CrabPort.app"
            CONTENTS="$APP/Contents"
            mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$CONTENTS/MacOS/"

            # Minimal Info.plist. Identifier from Cargo.toml [package.metadata.bundle].
            VERSION_NUM="${VERSION#v}"
            cat > "$CONTENTS/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>CrabPort</string>
            <key>CFBundleIdentifier</key><string>org.eu.tachibana-kanade.crabport</string>
            <key>CFBundleVersion</key><string>${VERSION_NUM}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION_NUM}</string>
            <key>CFBundleExecutable</key><string>CrabPort</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>10.15</string>
          </dict>
          </plist>
          EOF

            # Ad-hoc code-sign the assembled bundle. The release profile
            # strips the binary (Cargo.toml: strip = true), which invalidates
            # the linker's automatic ad-hoc signature — on Apple Silicon that
            # makes the OS refuse to launch it ("app is damaged"). Re-signing
            # restores a valid ad-hoc signature, turning the fatal "damaged"
            # error into the normal "unidentified developer" prompt.
            codesign --force --deep --sign - "$APP"
            codesign --verify --verbose "$APP"

            # `ditto` preserves the bundle's signature + metadata. Plain
            # `zip` mangles them and re-breaks the signature.
            ditto -c -k --keepParent "$APP" "${STAGE}.zip"
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          elif [ "${{ runner.os }}" = "Windows" ]; then
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            cp README.md README.en.md "$STAGE/" 2>/dev/null || true
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          else
            # Linux
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            cp README.md README.en.md "$STAGE/" 2>/dev/null || true
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      # ---- MSI installer (Windows x86_64 only, best-effort) ------------
      - name: Build MSI installer
        if: matrix.name == 'windows-x86_64'
        continue-on-error: true
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME"; if (-not $VERSION) { $VERSION = "dev" }
          choco install wixtoolset -y --no-progress
          $candle = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($candle) { $env:PATH = "$($candle.DirectoryName);$env:PATH" }
          cargo install cargo-wix --locked
          cargo wix --no-build --nocapture --target ${{ matrix.target }} --output "CrabPort-$VERSION-windows-x86_64.msi"
          echo "MSI=CrabPort-$VERSION-windows-x86_64.msi" >> $env:GITHUB_ENV

      # ---- Upload workflow artifacts (always, even on manual dispatch) --
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      - name: Upload AppImage artifact
        if: matrix.name == 'linux-x86_64' && env.APPIMAGE != ''
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-appimage
          path: ${{ env.APPIMAGE }}

      - name: Upload MSI artifact
        if: matrix.name == 'windows-x86_64' && env.MSI != ''
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-msi
          path: ${{ env.MSI }}

      # ---- Attach to GitHub Release (only on tag push) -----------------
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

      - name: Attach AppImage to GitHub Release
        if: matrix.name == 'linux-x86_64' && env.APPIMAGE != '' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APPIMAGE }}
          fail_on_unmatched_files: true

      - name: Attach MSI to GitHub Release
        if: matrix.name == 'windows-x86_64' && env.MSI != '' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MSI }}
          fail_on_unmatched_files: false
